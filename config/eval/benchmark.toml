# Unified benchmark configuration for GAIA and SWE-bench evaluations
# Used by: octo eval benchmark --config config/eval/benchmark.toml

[general]
output_dir = "eval_output/runs"
max_rounds = 20
timeout_seconds = 300
record_traces = true

# === Model Sets ===
[models]
quick = ["claude-sonnet-4-6"]
standard = ["claude-sonnet-4-6", "qwen3-30b-a3b", "mistral-small-3.2"]
full = [
    "claude-sonnet-4-6", "claude-opus-4-6",
    "qwen3-30b-a3b", "mistral-small-3.2",
    "minimax-m2.1"
]
default = "standard"

# === GAIA ===
[gaia]
dataset = "crates/octo-eval/datasets/gaia_sample.jsonl"
scorer = "exact_match"

[gaia.sampling]
quick = 10
standard = 30
full = 165
default = "standard"
stratified_ratio = [0.3, 0.5, 0.2]  # L1:L2:L3

# === SWE-bench ===
[swe_bench]
dataset = "crates/octo-eval/datasets/swe_bench_lite.jsonl"
scorer = "swebench_harness"
docker_required = true

[swe_bench.sampling]
quick = 10
standard = 30
full = 300
default = "standard"

[swe_bench.harness]
dataset_name = "princeton-nlp/SWE-bench_Lite"
max_workers = 4
cache_level = "env"
namespace = ""
