# Unified benchmark configuration for GAIA and SWE-bench evaluations
# Used by: cargo run -p octo-eval -- benchmark --config config/eval/benchmark.toml

[default]
timeout_secs = 300
record_traces = true
max_iterations = 30

# === Standard Model Set (5 models, all via OpenRouter) ===

[[models]]
name = "Qwen3.5-27B"
provider = "openai"
model = "qwen/qwen3.5-27b"
tier = "standard"

[[models]]
name = "MiniMax-M2.1"
provider = "openai"
model = "minimax/minimax-m2.1"
tier = "standard"

[[models]]
name = "Qwen3.5-9B"
provider = "openai"
model = "qwen/qwen3.5-9b"
tier = "economy"

[[models]]
name = "Qwen3-Coder-Next"
provider = "openai"
model = "qwen/qwen3-coder-next"
tier = "high"

[[models]]
name = "GLM-4.7-Flash"
provider = "openai"
model = "z-ai/glm-4.7-flash"
tier = "economy"

[[models]]
name = "Claude-Sonnet-4.6"
provider = "openai"
model = "anthropic/claude-sonnet-4-6"
tier = "flagship"

# === GAIA ===
[gaia]
dataset = "crates/octo-eval/datasets/gaia_sample.jsonl"
scorer = "exact_match"

[gaia.sampling]
quick = 10
standard = 30
full = 165
default = "standard"
stratified_ratio = [0.3, 0.5, 0.2]  # L1:L2:L3

# === GAIA (filtered) — runtime filter, deprecated in favor of subsets ===
[gaia_filtered]
dataset = "crates/octo-eval/datasets/gaia_sample.jsonl"
scorer = "exact_match"
exclude_file_extensions = ["png", "jpg", "jpeg", "gif", "mp3", "pptx"]
exclude_question_patterns = ["youtube.com"]

[gaia_filtered.sampling]
quick = 10
standard = 30
full = 149
default = "standard"
stratified_ratio = [0.3, 0.5, 0.2]

# === GAIA Category Subsets (fixed pre-generated JSONL files) ===
#
# | Subset          | Count | Description                                |
# |-----------------|------:|--------------------------------------------|
# | gaia_core       |   142 | All evaluable tasks (excludes media)       |
# | gaia_basic      |    31 | L1 single-step reasoning                   |
# | gaia_file       |    22 | File parsing (xlsx/pdf/csv/docx)           |
# | gaia_web        |    44 | Precise web data lookup                    |
# | gaia_reasoning  |    45 | L2/L3 multi-step reasoning (no files)      |
# | gaia_media      |    23 | Blind spot: image/audio/video (reference)  |

[gaia_core]
dataset = "crates/octo-eval/datasets/gaia_core.jsonl"
scorer = "exact_match"

[gaia_core.sampling]
quick = 10
standard = 30
half = 71
full = 142
default = "standard"

[gaia_basic]
dataset = "crates/octo-eval/datasets/gaia_basic.jsonl"
scorer = "exact_match"

[gaia_basic.sampling]
quick = 10
full = 31
default = "full"

[gaia_file]
dataset = "crates/octo-eval/datasets/gaia_file.jsonl"
scorer = "exact_match"

[gaia_file.sampling]
quick = 10
full = 22
default = "full"

[gaia_web]
dataset = "crates/octo-eval/datasets/gaia_web.jsonl"
scorer = "exact_match"

[gaia_web.sampling]
quick = 10
standard = 30
full = 44
default = "standard"

[gaia_reasoning]
dataset = "crates/octo-eval/datasets/gaia_reasoning.jsonl"
scorer = "exact_match"

[gaia_reasoning.sampling]
quick = 10
standard = 30
full = 45
default = "standard"

[gaia_media]
dataset = "crates/octo-eval/datasets/gaia_media.jsonl"
scorer = "exact_match"

[gaia_media.sampling]
quick = 10
full = 23
default = "full"

# === SWE-bench ===
[swe_bench]
dataset = "crates/octo-eval/datasets/swe_bench_lite.jsonl"
scorer = "swebench_harness"
docker_required = true

[swe_bench.sampling]
quick = 10
standard = 30
full = 300
default = "standard"

[swe_bench.harness]
dataset_name = "/Users/sujiangwen/sandbox/LLM/speechless.ai/Autonomous-Agents/octo-sandbox/crates/octo-eval/datasets/swe_bench_lite.jsonl"
max_workers = 4
cache_level = "env"
namespace = ""
python_bin = "/tmp/swebench-env/bin/python3"
